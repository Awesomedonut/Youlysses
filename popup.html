<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
      overflow-y: auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
    }

    .total-time {
      font-size: 28px;
      font-weight: 700;
      color: #7c6ff7;
      margin-bottom: 16px;
    }

    .site-list {
      list-style: none;
    }

    .site-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .site-item:last-child { border-bottom: none; }

    .site-rank {
      font-size: 11px;
      color: #555;
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .site-info { flex: 1; min-width: 0; }

    .site-domain {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-bar-container {
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .site-bar {
      height: 100%;
      background: #7c6ff7;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .site-time {
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      text-align: center;
      color: #555;
      padding: 40px 0;
      font-size: 13px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .date-nav button {
      background: #1a1a1a;
      border: none;
      color: #ccc;
      font-size: 16px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .date-nav button:hover { background: #2a2a2a; }
    .date-nav button:disabled { opacity: 0.3; cursor: default; }

    .date-label {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Youlysses</h1>
  <p class="subtitle">your ulysses pact</p>

  <div class="date-nav">
    <button id="prev-day">&larr;</button>
    <span class="date-label" id="date-label">Today</span>
    <button id="next-day">&rarr;</button>
  </div>

  <div class="total-time" id="total-time">0m</div>

  <ul class="site-list" id="site-list">
    <li class="empty">No data yet — start browsing!</li>
  </ul>

  <script src="popup.js"></script>
</body>
</html>
